<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PortalIRibeiro.FrontEnd</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/assistant.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="PortalIRibeiro.FrontEnd.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="loading-container">
            <div class="spinner-box">
                <div class="spinner-ring"></div>
                <div class="spinner-core"></div>
            </div>
            <div class="loading-text">Carregando o Portal...</div>
        </div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
    
    <script>
        window.blazorScrollToId = function(elementId) {

            console.log('Iniciando scroll');
            
            const element = document.getElementById(elementId);

            if (!element) return;

            const navbar = document.getElementById('mainNav');
            const navbarHeight = navbar ? navbar.offsetHeight : 0;

            const y =
                element.getBoundingClientRect().top +
                window.pageYOffset -
                navbarHeight;

            window.scrollTo({
                top: y,
                behavior: 'smooth'
            });

            console.log('scroll disparado');
        }
    </script>
</body>

</html>
